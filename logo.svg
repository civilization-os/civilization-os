<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100">
  <defs>
    <clipPath id="clip1">
      <rect id="rect1" x="20" y="15" width="0" height="30" />
    </clipPath>
    <clipPath id="clip2">
      <rect id="rect2" x="20" y="50" width="0" height="25" />
    </clipPath>
  </defs>
  <style>
    @keyframes type1 {
      from { width: 0; }
      to { width: 225px; } /* 15 chars * 15px = 225px */
    }
    @keyframes type2 {
      from { width: 0; }
      to { width: 110px; } /* 10 chars * 11px = 110px */
    }
    @keyframes moveCursor1 {
      from { transform: translateX(0); }
      to { transform: translateX(225px); }
    }
    @keyframes moveCursor2 {
      from { transform: translateX(0); }
      to { transform: translateX(110px); }
    }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes hide {
      to { opacity: 0; }
    }
    @keyframes show {
      to { opacity: 1; }
    }

    .line1 {
      font-family: Consolas, Monaco, 'Courier New', Courier, monospace;
      font-size: 24px;
      font-weight: bold;
      fill: currentColor;
    }
    .line2 {
      font-family: Consolas, Monaco, 'Courier New', Courier, monospace;
      font-size: 16px;
      fill: currentColor;
      opacity: 0.7;
    }

    #rect1 {
      animation: type1 1.5s steps(15) forwards;
    }
    #rect2 {
      animation: type2 1s steps(10) forwards;
      animation-delay: 2s;
    }

    .cursor1 {
      animation: 
        moveCursor1 1.5s steps(15) forwards,
        blink 0.8s step-end infinite,
        hide 0.01s forwards;
      animation-delay: 0s, 0s, 2s;
    }
    .cursor2 {
      opacity: 0;
      animation: 
        show 0.01s forwards,
        moveCursor2 1s steps(10) forwards,
        blink 0.8s step-end infinite;
      animation-delay: 2s, 2s, 2s;
    }
  </style>

  <!-- Line 1 -->
  <text x="20" y="40" class="line1" clip-path="url(#clip1)" textLength="225" lengthAdjust="spacingAndGlyphs">civilization-os</text>
  <rect x="20" y="18" width="2" height="24" fill="currentColor" class="cursor1" />

  <!-- Line 2 -->
  <text x="20" y="70" class="line2" clip-path="url(#clip2)" textLength="110" lengthAdjust="spacingAndGlyphs">Hi there 👋</text>
  <rect x="20" y="54" width="2" height="18" fill="currentColor" class="cursor2" />
</svg>
