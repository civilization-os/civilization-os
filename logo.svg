<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100">
  <defs>
    <style>
      @keyframes blink { 50% { opacity: 0; } }
      @keyframes type {
        0% { width: 0; }
        30%, 100% { width: 130px; }
      }
      .cursor { animation: blink 0.8s step-end infinite; }
    </style>
    <clipPath id="t">
      <rect x="0" y="0" height="30" fill="white" animation="type 4s ease forwards">
        <animate attributeName="width" from="0" to="130" dur="4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>
    </clipPath>
  </defs>
  <text x="20" y="40" font-family="monospace" font-size="24" fill="currentColor" font-weight="bold">
    civilization-os<tspan class="cursor">|</tspan>
  </text>
  <text x="20" y="72" font-family="monospace" font-size="16" fill="currentColor" opacity="0.7" clip-path="url(#t)">
    Hi there 👋
  </text>
  <text x="150" y="72" font-family="monospace" font-size="16" fill="currentColor" opacity="0.7">
    <tspan class="cursor">|</tspan>
  </text>
</svg>
